<svg
  width="1100"
  height="2400"
  viewBox="0 0 1100 2400"
  xmlns="http://www.w3.org/2000/svg"
  font-family="'Segoe UI',system-ui,Arial,sans-serif"
>

  <!-- ══ DEFS ══ -->
  <defs>

    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f0f4ff"/>
      <stop offset="100%" stop-color="#f8fafc"/>
    </linearGradient>

    <marker id="ab" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="abGreen" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="none" stroke="#64748b" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ao" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ap" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ag" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#16a34a" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="agray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>

    <marker id="arrowhead" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto">
      <polygon points="0 0, 4 2, 0 4" fill="#64748b"/>
    </marker>

    <filter id="s1">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000014"/>
    </filter>

    <filter id="s2">
      <feDropShadow dx="0" dy="3" stdDeviation="6" flood-color="#0000001a"/>
    </filter>

  </defs>

  <!-- ══ BACKGROUND ══ -->
  <rect width="1100" height="1920" fill="url(#bgGrad)"/>

  <!-- ══ TITLE ══ -->
  <text x="550" y="50"  text-anchor="middle" font-size="26" font-weight="800" fill="#1a1f5e">Space Tour Reservation System</text>
  <text x="550" y="74"  text-anchor="middle" font-size="17" fill="#5a6a8a">A simple reservation application built using AWS serverless services.</text>
  <line x1="70" y1="88" x2="1030" y2="88" stroke="#c5cde8" stroke-width="1"/>

  <!-- ══ RESERVATION PROCESS BANNER ══ -->
  <g transform="translate(60,100)">
    <rect width="980" height="90" rx="15" fill="#f8fafc" stroke="#64748b" stroke-width="2" filter="url(#s2)"/>
    <text x="490" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#334155">Reservation Process</text>
    <line x1="200" y1="38" x2="766" y2="38" stroke="#cbd5e1" stroke-width="1.2"/>
    <text x="490" y="60" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Traveler Details → Questions → Experience Selection → Reservation Review → Confirmation</text>
  </g>

  <!-- ══ MAIN DIAGRAM GROUP (offset y=130) ══ -->
  <g transform="translate(0,130)">

    <!-- ── USER / BROWSER ── -->
    <g id="block-user" transform="translate(125,120)">
      <rect width="300" height="68" rx="13" fill="white" stroke="#d0d6ec" stroke-width="1.5" filter="url(#s1)"/>
      <rect x="12" y="12" width="38" height="38" rx="8" fill="#eef1fb" stroke="#c5cde8" stroke-width="1.2"/>
      <text x="31"  y="45" text-anchor="middle" font-size="40">🌐</text>
      <text x="160" y="34" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1f5e">User / Browser</text>
      <line x1="70" y1="42" x2="255" y2="42" stroke="#d0d6ec" stroke-width="1.1"/>
      <text x="160" y="56" text-anchor="middle" font-size="13" fill="#6b7a9f" font-weight="700">www.elevateaws.com (HTTPS)</text>
    </g>

    <!-- DNS Query label -->
    <text
      x="495" y="145"
      text-anchor="middle"
      font-size="10" font-weight="600"
      fill="#334155"
      style="font-size:12px;"
    >DNS Query</text>

    <!-- Frontend API calls label -->
    <text
      x="330" y="444"
      text-anchor="middle"
      font-size="11" font-weight="600"
      fill="#334155"
      style="font-size:12px;"
    >Frontend API calls</text>

    <!-- User → Route53 arrow (horizontal) -->
    <line
      x1="425" y1="155"
      x2="578" y2="155"
      stroke="#64748b" stroke-width="1.8" stroke-dasharray="8 4"
      marker-end="url(#agray)"
    />

    <!-- Route53 → CloudFront arrow (vertical) -->
    <line
      x1="800" y1="204"
      x2="800" y2="248"
      stroke="#64748b" stroke-width="1.8" stroke-dasharray="8 4"
      marker-end="url(#agray)"
    />

    <!-- ── ROUTE 53 ── -->
    <g id="block-r53" transform="translate(270,-55)">
      <rect x="310" y="155" width="440" height="105" rx="16"
            fill="#F5EFFF" stroke="#8C4FFF" stroke-width="1.7" filter="url(#shadow-sm)"/>
      <image href="route53.svg" x="309" y="154" width="40" height="40"/>
      <text x="530" y="180" text-anchor="middle" font-size="16" font-weight="700" fill="#6B21D0">Amazon Route 53</text>
      <line x1="430" y1="188" x2="630" y2="188" stroke="#C4B5FD" stroke-width="1.2"/>
      <text x="530" y="204" text-anchor="middle" font-size="13" fill="#7C3AED">DNS Routing</text>
      <!-- Record pill -->
      <rect x="326" y="212" width="405" height="28" rx="9" fill="#ffffff" stroke="#C4B5FD" stroke-width="1.1"/>
      <rect x="326" y="212" width="56"  height="28" rx="7" fill="#8C4FFF"/>
      <text x="354" y="229" text-anchor="middle" font-size="9.8" font-weight="700" fill="#ffffff">Record</text>
      <text x="383" y="229" font-size="13" font-weight="700" fill="#6B21D0">www.elevateaws.com</text>
      <line x1="530" y1="227" x2="559" y2="227" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrowhead)"/>
      <text x="570" y="230" font-size="13" font-weight="700" fill="#7C3AED">CloudFront Distribution</text>
    </g>

    <!-- ── AMAZON S3 ── -->
    <g id="block-s3" transform="translate(80,260)">
      <rect width="400" height="150" rx="13" fill="#f1f8f2" stroke="#27ae60" stroke-width="1.8" filter="url(#s1)"/>
      <image href="s3.svg" x="-1" y="-1" width="40" height="40"/>
      <text x="200" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#1B5E20">Amazon S3</text>
      <line x1="95" y1="38" x2="305" y2="38" stroke="#a5d6a7" stroke-width="1.1"/>
      <text x="200" y="64"  text-anchor="middle" font-size="14" fill="#1b5e20">Web Application Assets</text>
      <text x="200" y="85"  text-anchor="middle" font-size="14" fill="#1b5e20">HTML · CSS · JavaScript</text>
      <text x="200" y="105" text-anchor="middle" font-size="14" fill="#1b5e20">🔒️Private Bucket · OAC Enforced</text>
      <text x="200" y="125" text-anchor="middle" font-size="14" fill="#1b5e20">No Direct Public Access</text>
    </g>

    <!-- ── AMAZON CLOUDFRONT ── -->
    <g transform="translate(550,250)">
      <rect width="490" height="172" rx="13"
            fill="#F5EFFF" stroke="#8C4FFF" stroke-width="1.8" filter="url(#s2)"/>
      <image href="cloudfront.svg" x="-1" y="-1" width="40" height="40"/>
      <text x="268" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#6B21D0">Amazon CloudFront</text>
      <line x1="90" y1="38" x2="450" y2="38" stroke="#C4B5FD" stroke-width="1.1"/>
      <text x="268" y="56" text-anchor="middle" font-size="14" font-weight="600" fill="#7C3AED">Global CDN · Edge Caching · Maintenance Routing</text>
      <!-- Origin pill -->
      <rect x="80" y="68" width="360" height="30" rx="6" fill="#fff" stroke="#C4B5FD" stroke-width="1"/>
      <text x="260" y="87" text-anchor="middle" font-size="14" font-weight="600" fill="#6B21D0">Origin: S3 (SPA Frontend)</text>
      <!-- Edge function pill -->
      <rect x="80" y="108" width="360" height="50" rx="6" fill="#fff" stroke="#C4B5FD" stroke-width="1"/>
      <text x="260" y="127" text-anchor="middle" font-size="14" font-weight="600" fill="#6B21D0">Edge Function: Maintenance Check</text>
      <text x="260" y="148" text-anchor="middle" font-size="14" fill="#7C3AED">ON → Offline page  |  OFF → Live Site</text>
    </g>

    <!-- CF → S3 arrow -->
    <line x1="550" y1="338" x2="480" y2="338" stroke="#64748b" stroke-width="1.8" stroke-dasharray="6 3" marker-end="url(#ap)"/>
    <text x="515" y="330" text-anchor="middle" font-size="12" font-weight="600" fill="#334155">OAC origin</text>

    <!-- CF → API GW arrow (vertical) -->
    <line
      x1="275" y1="409"
      x2="275" y2="468"
      stroke="#64748b" stroke-width="1.6" stroke-dasharray="8 4"
      marker-end="url(#agray)"
    />

    <!-- ── API GATEWAY ── -->
    <g id="block-apigw" transform="translate(60,470)">
      <rect width="980" height="115" rx="13" fill="#F5EFFF" stroke="#8C4FFF" stroke-width="1.8" filter="url(#s1)"/>
      <image href="api-gateway.svg" x="-1" y="-1" width="40" height="40"/>
      <text x="490" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#6B21D0">Amazon API Gateway</text>
      <line x1="350" y1="38" x2="630" y2="38" stroke="#C4B5FD" stroke-width="1.1"/>
      <text x="490" y="58" text-anchor="middle" font-size="14" fill="#7C3AED">HTTP API | Request Routing | CORS Enabled | Throttling: 10 Burst · 5 RPS</text>
      <!-- Route pills -->
      <g transform="translate(175,0)">
        <rect x="45" y="70" width="250" height="30" rx="6" fill="#ffffff" stroke="#8C4FFF" stroke-width="1"/>
        <text x="173" y="90" text-anchor="middle" font-size="14" fill="#6B21D0">Route: POST /validate-traveler</text>
      </g>
      <g transform="translate(470,0)">
        <rect x="45" y="70" width="250" height="30" rx="6" fill="#ffffff" stroke="#8C4FFF" stroke-width="1"/>
        <text x="173" y="90" text-anchor="middle" font-size="14" fill="#6B21D0">Route: POST /confirm-reservation</text>
      </g>
    </g>

    <!-- ── AWS LAMBDA ── -->
    <g id="block-lambda" transform="translate(60,635)">
      <rect width="980" height="148" rx="13" fill="#fffbeb" stroke="#f57c00" stroke-width="1.8" filter="url(#s2)"/>
      <image href="lambda.svg" x="-1" y="-1" width="40" height="40"/>
      <text x="490" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#bf360c">AWS Lambda</text>
      <line x1="340" y1="38" x2="650" y2="38" stroke="#ffcc80" stroke-width="1.1"/>
      <!-- Left panel -->
      <rect x="18" y="50" width="462" height="84" rx="10" fill="#ffffff" stroke="#e65100" stroke-width="1.2"/>
      <text x="249" y="72" text-anchor="middle" font-size="15" font-weight="700" fill="#bf360c">Function: Validate-Traveler</text>
      <line x1="130" y1="77" x2="360" y2="77" stroke="#ffab40" stroke-width="1.1"/>
      <text x="249" y="96"  text-anchor="middle" font-size="14" fill="#bf360c">Email Format Validation</text>
      <text x="249" y="115" text-anchor="middle" font-size="14" fill="#bf360c">Email Registration Check</text>
      <!-- Right panel -->
      <rect x="500" y="50" width="462" height="84" rx="10" fill="#ffffff" stroke="#e65100" stroke-width="1.2"/>
      <text x="731" y="72" text-anchor="middle" font-size="14" font-weight="700" fill="#bf360c">Function: Confirm-Reservation</text>
      <g transform="translate(15,0)">
        <line x1="580" y1="77" x2="860" y2="77" stroke="#ffab40" stroke-width="1.1"/>
        <text x="605" y="96"  text-anchor="middle" font-size="14" fill="#bf360c">1. Check Existing Reservation</text>
        <text x="830" y="96"  text-anchor="middle" font-size="14" fill="#bf360c">2. Write Reservation Record</text>
        <text x="590" y="120" text-anchor="middle" font-size="14" fill="#bf360c">3. Send Message to SQS</text>
        <text x="820" y="120" text-anchor="middle" font-size="14" fill="#bf360c">4. Return Reservation ID</text>
      </g>
    </g>

    <!-- API GW → Lambda arrows -->
    <line x1="400" y1="569" x2="300" y2="684"
          stroke="#64748b" stroke-width="2" stroke-dasharray="8 4"
          marker-end="url(#agray)"/>
    <text x="350" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b"
          transform="rotate(-49 350 625)">invoke</text>

    <line x1="700" y1="569" x2="800" y2="684"
          stroke="#64748b" stroke-width="2" stroke-dasharray="8 4"
          marker-end="url(#agray)"/>
    <text x="752" y="621" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b"
          transform="rotate(49 750 625)">invoke</text>

    <!-- ── AMAZON DYNAMODB ── -->
    <g id="block-ddb" transform="translate(260,825)">
      <rect width="580" height="96" rx="13" fill="#EDEFFF" stroke="#527FFF" stroke-width="1.8" filter="url(#s1)"/>
      <image href="dynamodb.svg" x="-1" y="-1" width="40" height="40"/>
      <text x="290" y="33" text-anchor="middle" font-size="16" font-weight="700" fill="#2E27AD">Amazon DynamoDB</text>
      <line x1="150" y1="38" x2="430" y2="38" stroke="#A5B4FC" stroke-width="1.1"/>
      <text x="290" y="59" text-anchor="middle" font-size="14" fill="#3730A3">Table: Reservation Details</text>
      <text x="290" y="79" text-anchor="middle" font-size="14" fill="#3730A3">On-Demand · Serverless · Scales Automatically</text>
    </g>

    <!-- Lambda → DynamoDB Read arrow -->
    <path d="M160 768 L160 890 L260 890"
          fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 4"
          marker-end="url(#agray)"/>
    <text x="200" y="880" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">Read</text>

    <!-- Lambda → DynamoDB Read·Write arrow -->
    <path d="M960 782 L960 890 L840 890"
          fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 4"
          marker-end="url(#agray)"/>
    <text x="900" y="880" text-anchor="middle" font-size="12" font-weight="700" fill="#64748b">Read · Write</text>

    <!-- ── ASYNC EMAIL WORKFLOW ── -->
    <g id="block-async" transform="translate(60,960)">

      <defs>
        <marker id="agray" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
          <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        </marker>
      </defs>

      <rect width="980" height="200" rx="15" fill="#F1F5F9" stroke="#64748B" stroke-width="2" filter="url(#s2)"/>

      <!-- Section header pill -->
      <rect x="300" y="-15" width="390" height="30" rx="10" fill="#475569"/>
      <text x="495" y="6" text-anchor="middle" font-size="16" font-weight="700" fill="white">Asynchronous Email Workflow</text>

      <g transform="translate(0,-30)">

        <!-- User Inbox -->
        <g transform="translate(22,70)">
          <rect width="168" height="130" rx="11" fill="white" stroke="#c5cde8" stroke-width="1.5" filter="url(#s1)"/>
          <image href="inbox.png" x="12" y="10" width="40" height="36"/>
          <text x="100" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#1a1f5e">User Inbox</text>
          <line x1="50" y1="40" x2="160" y2="40" stroke="#d0d6ec" stroke-width="1.1"/>
          <text x="84" y="80"  text-anchor="middle" font-size="14" fill="#1a1f5e">Receives</text>
          <text x="84" y="103" text-anchor="middle" font-size="14" fill="#1a1f5e">Confirmation Email</text>
        </g>

        <!-- SES → Inbox arrow -->
        <line x1="240" y1="135" x2="190" y2="135"
              stroke="#64748b" stroke-width="2" marker-end="url(#agray)"/>

        <!-- Amazon SES -->
        <g transform="translate(240,70)">
          <defs>
            <filter id="s1-ses">
              <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000014"/>
            </filter>
            <marker id="agray-ses" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
              <path d="M1 1L9 5L1 9" fill="none" stroke="#64748b" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </marker>
          </defs>
          <rect width="204" height="130" rx="11" fill="#EDEFFF" stroke="#527FFF" stroke-width="1.8" filter="url(#s1-ses)"/>
          <image href="ses.png" x="12" y="12" width="36" height="36"/>
          <text x="102" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#2E27AD">Amazon SES</text>
          <line x1="50" y1="40" x2="170" y2="40" stroke="#A5B4FC" stroke-width="1.4"/>
          <text x="102" y="70"  text-anchor="middle" font-size="14" font-weight="500" fill="#3730A3">Email Delivery Service</text>
          <text x="102" y="90"  text-anchor="middle" font-size="12" fill="#3730A3">Domain Verified · Production Access</text>
          <text x="102" y="110" text-anchor="middle" font-size="14" fill="#3730A3">Reliable Email Delivery</text>
        </g>

        <!-- Lambda → SES arrow -->
        <line x1="494" y1="135" x2="444" y2="135"
              stroke="#64748b" stroke-width="2" marker-end="url(#agray-ses)"/>

        <!-- AWS Lambda (email) -->
        <g transform="translate(494,70)">
          <rect width="204" height="130" rx="11" fill="#fff7ed" stroke="#ED7100" stroke-width="1.8" filter="url(#s1)"/>
          <image href="lambda.svg" x="12" y="12" width="36" height="36"/>
          <text x="105" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#ED7100">AWS Lambda</text>
          <line x1="50" y1="40" x2="170" y2="40" stroke="#fdba74" stroke-width="1"/>
          <text x="102" y="70"  text-anchor="middle" font-size="14"   fill="#C2410C">1. Read Queue Messages</text>
          <text x="102" y="90"  text-anchor="middle" font-size="13.3" fill="#C2410C">2. Generate Confirmation Email</text>
          <text x="102" y="110" text-anchor="middle" font-size="14"   fill="#C2410C">3. Send Email to SES</text>
        </g>

        <!-- SQS → Lambda arrow -->
        <line x1="748" y1="135" x2="698" y2="135"
              stroke="#64748b" stroke-width="2" marker-end="url(#agray)"/>

        <!-- Amazon SQS -->
        <g transform="translate(748,70)">
          <rect width="204" height="130" rx="11" fill="#fdf2f8" stroke="#E7157B" stroke-width="1.8" filter="url(#s1)"/>
          <image href="sqs.svg" x="12" y="12" width="36" height="36"/>
          <text x="105" y="35" text-anchor="middle" font-size="16" font-weight="700" fill="#E7157B">Amazon SQS</text>
          <line x1="50" y1="40" x2="170" y2="40" stroke="#f9a8d4" stroke-width="1.1"/>
          <text x="102" y="73" text-anchor="middle" font-size="14" fill="#BE185D">Queue: Messages</text>
          <text x="102" y="97" text-anchor="middle" font-size="14" fill="#BE185D">Queue: DLQ</text>
        </g>

        <!-- Flow labels -->
        <text x="727" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#334155" style="font-size:12px;">polls</text>
        <text x="216" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#334155" style="font-size:12px;">delivers</text>
        <text x="471" y="128" text-anchor="middle" font-size="10" font-weight="600" fill="#334155" style="font-size:12px;">sends</text>

      </g>
    </g>

    <!-- DDB → SQS connector -->
    <path d="M920,889 L920,1020"
          fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="8 4"
          marker-end="url(#agray)"/>

    <!-- Route 53 loop-back arrow -->
    <path d="M58,1250 L20,1250 L20,310 L80,310"
          fill="none" stroke="#64748b" stroke-width="2" stroke-dasharray="5 4"
          marker-end="url(#agray)"/>

    <!-- ── CI/CD PIPELINE ── -->
    <g id="block-cicd" transform="translate(60,1200)">
      <rect width="980" height="175" rx="15" fill="#f0fdf4" stroke="#166534" stroke-width="2" filter="url(#s2)"/>
      <!-- Header pill -->
      <rect x="300" y="-15" width="390" height="30" rx="10" fill="#166534"/>
      <image href="github.svg" x="302" y="-15" width="30" height="30"/>
      <text x="336" y="5" font-size="16" font-weight="700" fill="white">CI/CD Pipeline — GitHub Actions Deployment</text>
      <!-- GitHub Repo -->
      <g transform="translate(20,46)">
        <rect width="210" height="106" rx="11" fill="white" stroke="#16a34a" stroke-width="1.6" filter="url(#s1)"/>
        <rect x="0" y="0" width="210" height="28" rx="9" fill="#16a34a"/>
        <text x="105" y="19" text-anchor="middle" font-size="14" font-weight="700" fill="white">GitHub Repository</text>
        <text x="105" y="58" text-anchor="middle" font-size="14" fill="#166534">Application Source Code</text>
