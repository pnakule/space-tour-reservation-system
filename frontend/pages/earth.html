<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Earth Background — Blinking Stars</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: #000;
  }

  .scene {
    position: relative;
    width: 100%;
    height: 100vh;
    background: url('earth.png') center center / cover no-repeat;
    overflow: hidden;
  }

  /* ── Star layer ─────────────────────────────────── */
  .stars {
    position: absolute;
    inset: 0;
    pointer-events: none;
  }

  .star {
    position: absolute;
    border-radius: 50%;
    background: #ffffff;
    box-shadow: 0 0 4px 1px rgba(255,255,255,0.8);
    animation-name: twinkle;
    animation-iteration-count: infinite;
    animation-timing-function: ease-in-out;
  }

  @keyframes twinkle {
    0%, 100% { opacity: 0.25; transform: scale(0.8); }
    50%      { opacity: 1;    transform: scale(1.3); }
  }
</style>
</head>
<body>

  <div class="scene">
    <div class="stars" id="stars"></div>
  </div>

  <script>
    // Generate blinking stars at random positions, sizes, durations & delays.
    const starsContainer = document.getElementById('stars');
    const STAR_COUNT = 150;

    for (let i = 0; i < STAR_COUNT; i++) {
      const star = document.createElement('div');
      star.className = 'star';

      const size = (Math.random() * 2 + 1).toFixed(2); // 1px - 3px
      const top  = (Math.random() * 100).toFixed(2);   // 0% - 100%
      const left = (Math.random() * 100).toFixed(2);   // 0% - 100%
      const duration = (Math.random() * 3 + 1.5).toFixed(2); // 1.5s - 4.5s
      const delay = (Math.random() * 5).toFixed(2);          // 0s - 5s

      star.style.width  = size + 'px';
      star.style.height = size + 'px';
      star.style.top    = top + '%';
      star.style.left   = left + '%';
      star.style.animationDuration = duration + 's';
      star.style.animationDelay = '-' + delay + 's';

      starsContainer.appendChild(star);
    }
  </script>

</body>
</html>
